<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whack-a-Mole — Game Galaxy</title>
<link rel="stylesheet" href="style.css">
<style>
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; max-width:340px; margin:0 auto; }
  .hole {
    aspect-ratio:1; background:rgba(10,20,50,0.9);
    border:2px solid rgba(50,90,200,0.3); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:44px; cursor:pointer; user-select:none;
    transition:background 0.1s, transform 0.1s;
  }
  .hole.up { background:rgba(20,60,20,0.9); border-color:rgba(60,200,80,0.5); transform:scale(1.06); }
  .hole.bonk { background:rgba(60,10,10,0.9); transform:scale(0.95); }
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="content">
  <div class="game-wrap">
    <a class="back-btn" href="https://evan64721.github.io/GameGalaxy/" onclick="event.preventDefault();navigate('https://evan64721.github.io/GameGalaxy/')">← Back to Galaxy</a>
    <h2 class="game-title">🔨 Whack-a-Mole</h2>
    <div class="grid" id="grid"></div>
    <div class="msg" id="msg">Press Start and smash those moles!</div>
    <div class="stat-row">
      <div class="stat-item"><div class="stat-lbl">Score</div><div class="stat-val" id="score">0</div></div>
      <div class="stat-item"><div class="stat-lbl">Time</div><div class="stat-val" id="time">30s</div></div>
      <div class="stat-item"><div class="stat-lbl">Best</div><div class="stat-val" id="best">0</div></div>
    </div>
    <div class="controls"><button class="btn" id="startBtn" onclick="startGame()">Start</button></div>
  </div>
</div>
<script src="stars.js"></script>
<script>
  let score=0,running=false,timeLeft=30,iv=null,moleIv=null;
  const saved=loadScore('whack');
  let best=saved.best||0;
  document.getElementById('best').textContent=best;
  let active=new Array(9).fill(false);

  const grid=document.getElementById('grid');
  for(let i=0;i<9;i++){
    const h=document.createElement('div'); h.className='hole'; h.dataset.i=i; h.textContent='🕳️';
    h.addEventListener('click',()=>whack(i));
    h.addEventListener('touchstart',e=>{e.preventDefault();whack(i);},{passive:false});
    grid.appendChild(h);
  }

  function getHole(i){return document.querySelector(`.hole[data-i="${i}"]`);}

  function popMole(){
    const i=Math.floor(Math.random()*9); if(active[i]) return;
    active[i]=true; const h=getHole(i); h.textContent='🦔'; h.classList.add('up');
    setTimeout(()=>{ if(active[i]){active[i]=false; h.textContent='🕳️'; h.classList.remove('up');} },950);
  }

  function whack(i){
    if(!running||!active[i]) return;
    active[i]=false; score++; document.getElementById('score').textContent=score;
    const h=getHole(i); h.textContent='💥'; h.classList.remove('up'); h.classList.add('bonk');
    setTimeout(()=>{h.textContent='🕳️'; h.classList.remove('bonk');},300);
  }

  function startGame(){
    if(running) return;
    score=0; timeLeft=30; running=true; active.fill(false);
    document.getElementById('score').textContent='0';
    document.getElementById('time').textContent='30s';
    document.getElementById('msg').textContent='Whack those moles!';
    document.getElementById('startBtn').disabled=true;
    document.querySelectorAll('.hole').forEach(h=>{h.textContent='🕳️'; h.className='hole';});
    clearInterval(moleIv); moleIv=setInterval(popMole,650);
    clearInterval(iv);
    iv=setInterval(()=>{
      timeLeft--; document.getElementById('time').textContent=timeLeft+'s';
      if(timeLeft<=0){
        clearInterval(iv); clearInterval(moleIv); running=false; active.fill(false);
        document.querySelectorAll('.hole').forEach(h=>{h.textContent='🕳️'; h.className='hole';});
        document.getElementById('startBtn').disabled=false;
        if(score>best){best=score; document.getElementById('best').textContent=best;}
        const s=score>=20?3:score>=10?2:1;
        document.getElementById('msg').textContent='Done! '+score+' hits! '+'⭐'.repeat(s);
        saveScore('whack',{best,stars:s});
      }
    },1000);
  }
</script>
</body>
</html>
