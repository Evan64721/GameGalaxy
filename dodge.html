<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodge Asteroids — Game Galaxy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="starfield"></canvas>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="content">
  <div class="game-wrap">
    <a class="back-btn" href="https://evan64721.github.io/GameGalaxy/" onclick="event.preventDefault();navigate('https://evan64721.github.io/GameGalaxy/')">← Back to Galaxy</a>
    <h2 class="game-title">🚀 Dodge Asteroids</h2>
    <div class="canvas-wrap" style="max-width:420px;">
      <canvas id="game" width="420" height="320"></canvas>
    </div>
    <div class="msg" id="msg">Press Start and dodge the asteroids!</div>
    <div class="stat-row">
      <div class="stat-item"><div class="stat-lbl">Score</div><div class="stat-val" id="score">0</div></div>
      <div class="stat-item"><div class="stat-lbl">Best</div><div class="stat-val" id="best">0</div></div>
    </div>
    <div class="controls"><button class="btn" id="startBtn" onclick="startGame()">Start Game</button></div>
    <p class="hint">Arrow Keys / A & D to move • Tap left or right on mobile</p>
  </div>
</div>
<script src="stars.js"></script>
<script>
  const canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
  const W=420,H=320;
  const saved=loadScore('dodge');
  let best=saved.best||0;
  document.getElementById('best').textContent=best;
  let shipX,asteroids,score,raf,running=false,keys={},lastSpawn=0;

  document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowLeft','ArrowRight','a','d'].includes(e.key))e.preventDefault();});
  document.addEventListener('keyup',e=>keys[e.key]=false);
  canvas.addEventListener('touchstart',e=>{
    const r=canvas.getBoundingClientRect();
    if(e.touches[0].clientX-r.left<r.width/2)keys['ArrowLeft']=true; else keys['ArrowRight']=true;
  },{passive:true});
  canvas.addEventListener('touchend',()=>{keys['ArrowLeft']=false;keys['ArrowRight']=false;},{passive:true});

  function startGame(){
    shipX=W/2; asteroids=[]; score=0; running=true; lastSpawn=0;
    document.getElementById('score').textContent='0';
    document.getElementById('msg').textContent='Dodge the asteroids!';
    document.getElementById('startBtn').textContent='Restart';
    if(raf)cancelAnimationFrame(raf); loop(0);
  }

  function loop(ts){
    if(!running) return;
    if(ts-lastSpawn>Math.max(350,800-score*0.4)){
      asteroids.push({x:20+Math.random()*(W-40),y:-16,r:8+Math.random()*12,vy:1.8+Math.random()*2+score*0.004});
      lastSpawn=ts;
    }
    if(keys['ArrowLeft']||keys['a'])shipX=Math.max(16,shipX-5);
    if(keys['ArrowRight']||keys['d'])shipX=Math.min(W-16,shipX+5);
    asteroids.forEach(a=>a.y+=a.vy);
    asteroids=asteroids.filter(a=>a.y<H+30);
    score++; document.getElementById('score').textContent=score;
    const sy=H-44;
    for(const a of asteroids){
      const dx=a.x-shipX,dy=a.y-sy;
      if(Math.sqrt(dx*dx+dy*dy)<a.r+13){
        running=false;
        if(score>best){best=score; document.getElementById('best').textContent=best;}
        const s=score>=500?3:score>=200?2:1;
        document.getElementById('msg').textContent='💥 Crashed! Score: '+score+' '+'⭐'.repeat(s);
        document.getElementById('startBtn').textContent='Try Again';
        saveScore('dodge',{best,stars:s});
        draw(sy); ctx.fillStyle='rgba(200,50,50,0.3)'; ctx.fillRect(0,0,W,H); return;
      }
    }
    draw(sy); raf=requestAnimationFrame(loop);
  }

  function draw(sy){
    ctx.fillStyle='#050a18'; ctx.fillRect(0,0,W,H);
    asteroids.forEach(a=>{
      ctx.fillStyle='#7a5c3a'; ctx.beginPath(); ctx.arc(a.x,a.y,a.r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#aa8855'; ctx.lineWidth=1.5; ctx.stroke();
    });
    ctx.fillStyle='#4488ff';
    ctx.beginPath(); ctx.moveTo(shipX,sy-18); ctx.lineTo(shipX-14,sy+16); ctx.lineTo(shipX,sy+9); ctx.lineTo(shipX+14,sy+16); ctx.closePath(); ctx.fill();
    ctx.fillStyle=`rgba(255,${130+Math.floor(Math.random()*80)},30,0.9)`;
    ctx.beginPath(); ctx.moveTo(shipX-8,sy+9); ctx.lineTo(shipX,sy+26+Math.random()*8); ctx.lineTo(shipX+8,sy+9); ctx.closePath(); ctx.fill();
  }

  ctx.fillStyle='#050a18'; ctx.fillRect(0,0,W,H);
</script>
</body>
</html>
