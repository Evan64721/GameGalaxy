<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌌 Game Galaxy</title>
<link rel="stylesheet" href="style.css">
<style>
  header { text-align: center; padding: 50px 20px 30px; }
  header h1 { font-size: clamp(26px, 6vw, 46px); margin-bottom: 8px; }
  header p { font-size: 12px; color: #7899cc; letter-spacing: 3px; text-transform: uppercase; }
  .score-bar {
    display: flex; justify-content: center; gap: 32px;
    max-width: 400px; margin: 0 auto 36px;
    padding: 14px 24px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(100,160,255,0.15);
    border-radius: 14px;
  }
  .score-item { text-align: center; }
  .score-label { font-size: 10px; color: #5577aa; letter-spacing: 2px; text-transform: uppercase; }
  .score-value { font-family: 'Orbitron', monospace; font-size: 24px; font-weight: 700; color: #88ccff; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px; max-width: 860px; margin: 0 auto; padding: 0 20px 60px;
  }
  .card {
    background: rgba(10,20,50,0.85);
    border: 1px solid rgba(80,140,255,0.2);
    border-radius: 14px; padding: 22px 14px 18px;
    text-align: center; cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, background 0.2s;
    text-decoration: none; display: block; color: inherit;
  }
  .card:hover { transform: translateY(-5px); border-color: rgba(100,180,255,0.6); background: rgba(20,40,90,0.9); }
  .card-icon { font-size: 34px; display: block; margin-bottom: 10px; }
  .card-name { font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 700; color: #c0d8ff; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
  .card-desc { font-size: 11px; color: #4a6a99; line-height: 1.5; }
  .card-best { font-size: 10px; color: #2a5a88; margin-top: 6px; font-family: 'Orbitron', monospace; }
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>
<div class="content">
  <header>
    <h1>🌌 Game Galaxy</h1>
    <p>Your personal arcade — 11 games to explore</p>
  </header>
  <div class="score-bar">
    <div class="score-item"><div class="score-label">Total Stars</div><div class="score-value" id="total-stars">0</div></div>
    <div class="score-item"><div class="score-label">Games Played</div><div class="score-value" id="games-played">0</div></div>
  </div>
  <div class="grid" id="grid"></div>
</div>
<script src="stars.js"></script>
<script>
const BASE = 'https://evan64721.github.io/GameGalaxy/';
const GAMES = [
  { id:'reaction', name:'Reaction Timer',     icon:'⚡', desc:'How fast can you react?',     file:'reaction.html' },
  { id:'snake',    name:'Snake',               icon:'🐍', desc:'Eat food, grow longer.',       file:'snake.html'    },
  { id:'memory',   name:'Memory Match',        icon:'🧠', desc:'Find all the pairs!',          file:'memory.html'   },
  { id:'click',    name:'Click Speed',         icon:'👆', desc:'Click as fast as you can.',    file:'click.html'    },
  { id:'target',   name:'Moving Target',       icon:'🎯', desc:'Hit the moving target!',       file:'target.html'   },
  { id:'rps',      name:'Rock Paper Scissors', icon:'✊', desc:'Beat the computer!',           file:'rps.html'      },
  { id:'pong',     name:'Pong',                icon:'🏓', desc:'Classic paddle battle.',       file:'pong.html'     },
  { id:'whack',    name:'Whack-a-Mole',        icon:'🔨', desc:'Smash those moles!',           file:'whack.html'    },
  { id:'guess',    name:'Number Guessing',     icon:'🔢', desc:'Find the secret number.',      file:'guess.html'    },
  { id:'ttt',      name:'Tic-Tac-Toe',         icon:'⭕', desc:'Beat the AI!',                file:'ttt.html'      },
  { id:'dodge',    name:'Dodge Asteroids',     icon:'🚀', desc:'Survive the asteroid field!', file:'dodge.html'    },
];

const stats = JSON.parse(localStorage.getItem('gg-stats') || '{"stars":0,"played":0}');
document.getElementById('total-stars').textContent = stats.stars;
document.getElementById('games-played').textContent = stats.played;

const scores = JSON.parse(localStorage.getItem('gg-scores') || '{}');
const grid = document.getElementById('grid');
GAMES.forEach(g => {
  const best = scores[g.id];
  const card = document.createElement('a');
  card.className = 'card';
  card.href = BASE + g.file;
  card.onclick = e => { e.preventDefault(); navigate(BASE + g.file); };
  card.innerHTML = `
    <span class="card-icon">${g.icon}</span>
    <div class="card-name">${g.name}</div>
    <div class="card-desc">${g.desc}</div>
    ${best && best.best ? `<div class="card-best">Best: ${best.best}</div>` : ''}
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
