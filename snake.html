<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake — Game Galaxy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="starfield"></canvas>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="content">
  <div class="game-wrap">
    <a class="back-btn" href="https://evan64721.github.io/GameGalaxy/" onclick="event.preventDefault();navigate('https://evan64721.github.io/GameGalaxy/')">← Back to Galaxy</a>
    <h2 class="game-title">🐍 Snake</h2>
    <div class="canvas-wrap" style="max-width:400px;">
      <canvas id="game" width="400" height="400"></canvas>
    </div>
    <div class="msg" id="msg">Press Start to play</div>
    <div class="stat-row">
      <div class="stat-item"><div class="stat-lbl">Score</div><div class="stat-val" id="score">0</div></div>
      <div class="stat-item"><div class="stat-lbl">Best</div><div class="stat-val" id="best">0</div></div>
    </div>
    <div class="controls"><button class="btn" id="startBtn" onclick="startGame()">Start Game</button></div>
    <p class="hint">Arrow Keys to move • Swipe on mobile</p>
  </div>
</div>
<script src="stars.js"></script>
<script>
  const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
  const CELL = 20, COLS = 20, ROWS = 20;
  let snake, dir, nextDir, food, score, interval, running = false;
  const saved = loadScore('snake');
  let best = saved.best || 0;
  document.getElementById('best').textContent = best;

  function startGame() {
    snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir = {x:1,y:0}; nextDir = {x:1,y:0}; score = 0;
    placeFood(); clearInterval(interval); running = true;
    document.getElementById('score').textContent = '0';
    document.getElementById('msg').textContent = '';
    document.getElementById('startBtn').textContent = 'Restart';
    interval = setInterval(tick, 130);
  }

  function placeFood() {
    do { food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
    while (snake.some(s => s.x===food.x && s.y===food.y));
  }

  function tick() {
    dir = nextDir;
    const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
    if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
      clearInterval(interval); running = false;
      if (score > best) { best = score; document.getElementById('best').textContent = best; }
      saveScore('snake', { best, stars: Math.max(1, Math.ceil(score/3)) });
      document.getElementById('msg').textContent = 'Game Over! Score: ' + score;
      return;
    }
    snake.unshift(head);
    if (head.x===food.x && head.y===food.y) { score++; document.getElementById('score').textContent = score; placeFood(); }
    else snake.pop();
    draw();
  }

  function draw() {
    ctx.fillStyle = '#050a18'; ctx.fillRect(0,0,400,400);
    for (let x=0;x<COLS;x++) for (let y=0;y<ROWS;y++)
      if ((x+y)%2===0) { ctx.fillStyle='rgba(255,255,255,0.02)'; ctx.fillRect(x*CELL,y*CELL,CELL,CELL); }
    ctx.fillStyle = '#ff4455';
    ctx.beginPath(); ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, 7, 0, Math.PI*2); ctx.fill();
    snake.forEach((s,i) => {
      ctx.fillStyle = i===0 ? '#88eebb' : `rgba(40,180,100,${Math.max(0.15,1-i*0.04)})`;
      ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
    });
  }

  document.addEventListener('keydown', e => {
    const map = {ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
    const d = map[e.key];
    if (d && !(d.x===-dir.x && d.y===-dir.y)) { nextDir = d; e.preventDefault(); }
  });
  let tx=0,ty=0;
  canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
  canvas.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>Math.abs(dy)) nextDir=dx>0?{x:1,y:0}:{x:-1,y:0};
    else nextDir=dy>0?{x:0,y:1}:{x:0,y:-1};
  },{passive:true});

  ctx.fillStyle='#050a18'; ctx.fillRect(0,0,400,400);
</script>
</body>
</html>
