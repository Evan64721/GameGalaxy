<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moving Target — Game Galaxy</title>
<link rel="stylesheet" href="style.css">
<style>
  #arena {
    position:relative; width:100%; max-width:500px; height:300px;
    margin:0 auto; background:rgba(5,10,30,0.9);
    border:1px solid rgba(60,120,255,0.2); border-radius:14px;
    overflow:hidden; cursor:crosshair;
  }
  #target {
    position:absolute; width:56px; height:56px; border-radius:50%;
    background:radial-gradient(circle,#5599ff,#1133aa);
    border:2px solid #88bbff; display:flex; align-items:center;
    justify-content:center; cursor:pointer; font-size:22px;
    box-shadow:0 0 20px rgba(80,150,255,0.5);
    transition:left 0.12s ease, top 0.12s ease; user-select:none;
  }
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="content">
  <div class="game-wrap">
    <a class="back-btn" href="https://evan64721.github.io/GameGalaxy/" onclick="event.preventDefault();navigate('https://evan64721.github.io/GameGalaxy/')">← Back to Galaxy</a>
    <h2 class="game-title">🎯 Moving Target</h2>
    <div id="arena"><div id="target" onclick="hit()">🎯</div></div>
    <div class="msg" id="msg">Press Start then click the target!</div>
    <div class="stat-row">
      <div class="stat-item"><div class="stat-lbl">Hits</div><div class="stat-val" id="hits">0</div></div>
      <div class="stat-item"><div class="stat-lbl">Time</div><div class="stat-val" id="time">20s</div></div>
      <div class="stat-item"><div class="stat-lbl">Best</div><div class="stat-val" id="best">0</div></div>
    </div>
    <div class="controls"><button class="btn" id="startBtn" onclick="startGame()">Start</button></div>
  </div>
</div>
<script src="stars.js"></script>
<script>
  let hits=0, running=false, timeLeft=20, iv=null, moveIv=null;
  const saved=loadScore('target');
  let best=saved.best||0;
  document.getElementById('best').textContent=best;

  function moveTgt() {
    const arena=document.getElementById('arena'), t=document.getElementById('target');
    t.style.left=Math.floor(Math.random()*(arena.offsetWidth-60))+'px';
    t.style.top=Math.floor(Math.random()*(arena.offsetHeight-60))+'px';
  }

  function startGame() {
    if(running) return;
    hits=0; timeLeft=20; running=true;
    document.getElementById('hits').textContent='0';
    document.getElementById('time').textContent='20s';
    document.getElementById('msg').textContent='Hit the target!';
    document.getElementById('startBtn').disabled=true;
    moveTgt(); clearInterval(moveIv); moveIv=setInterval(moveTgt,1000);
    clearInterval(iv);
    iv=setInterval(()=>{
      timeLeft--; document.getElementById('time').textContent=timeLeft+'s';
      if(timeLeft<=0) {
        clearInterval(iv); clearInterval(moveIv); running=false;
        document.getElementById('startBtn').disabled=false;
        if(hits>best){best=hits; document.getElementById('best').textContent=best;}
        const s=hits>=15?3:hits>=8?2:1;
        document.getElementById('msg').textContent=hits+' hits! '+'⭐'.repeat(s);
        saveScore('target',{best,stars:s});
      }
    },1000);
  }

  function hit() {
    if(!running) return;
    hits++; document.getElementById('hits').textContent=hits; moveTgt();
  }
</script>
</body>
</html>
